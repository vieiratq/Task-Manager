<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/dash.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">T</span>
            <h1>Tarefas</h1>
        </div>

        <div class="topbar-actions">
            <p class="level-badge">Nivel <span id="level">loading...</span></p>
            <a class="logout" href="/logout">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Sair</span>
            </a>
        </div>
    </header>

    <main class="container">
        <section class="cards">
            <div class="card">
                <span class="card-label">Usuario</span>
                <strong id="username">Loading...</strong>
            </div>

            <div class="card">
                <span class="card-label">User ID</span>
                <strong id="userId">Loading...</strong>
            </div>

            <div class="card">
                <span class="card-label">Plano</span>
                <strong id="plan">Loading...</strong>
            </div>
        </section>

        <div class="workspace">
            <section class="section task-form-panel">
                <div class="section-head">
                    <h2>Nova tarefa</h2>
                </div>

                <span id="taskmsg"></span>

                <form id="taskForm">
                    <label for="taskTitle">Titulo</label>
                    <input type="text" id="taskTitle" placeholder="Ex: estudar backend" required />

                    <label for="taskDescription">Descricao</label>
                    <textarea id="taskDescription" placeholder="Detalhes da tarefa" rows="4"></textarea>

                    <button id="submit1" type="submit">
                        <i class="fa-solid fa-plus"></i>
                        <span>Criar tarefa</span>
                    </button>
                </form>
            </section>

            <section class="section tasks-panel">
                <div class="tasks1">
                    <div class="section-head">
                        <h2 id="postedtask">Tarefas</h2>
                        <span id="taskSpan"></span>
                    </div>
                    <button id="atualizar" type="button">
                        <i class="fa-solid fa-rotate-right"></i>
                        <span>Atualizar</span>
                    </button>
                </div>

                <div id="tasksList">
                    <p class="empty">Carregando tarefas...</p>
                </div>
            </section>
        </div>
    </main>
    <script src="/dash.js"></script>
</body>

</html>
