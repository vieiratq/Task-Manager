<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="../public/dash.css" />
</head>

<body>
    <header>
        <h1>Dashboard</h1>
        <h2>level: <span id="level"> loading...</span></h2>
        <a class="logout" href="/logout">Logout</a>
    </header>

    <main class="container">
        <section class="cards">
            <div class="card">
                Username
                <span id="username">Loading...</span>
            </div>

            <div class="card">
                User ID
                <span id="userId">Loading...</span>
            </div>

            <div class="card">
                Plan
                <span id="plan">Loading...</span>
            </div>
        </section>

        <section class="section">
            <h2>Post a new task</h2>
            <span id="taskmsg"></span>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Task title" required />

                <textarea id="taskDescription" placeholder="Task description" rows="4"></textarea>

                <button id="submit1" type="submit">Post Task</button>
            </form>
        </section>

        <section class="section">
            <div class="tasks1">
                <h2 id="postedtask" >Posted tasks</h2>
                <button id="atualizar">atualizar</button>
            </div>
            <div id="tasksList">
                <div class="task">
                    <h3 class="task-title">Task 1</h3>
                    <p class="task-desc">Description of task 1</p>
                </div>
                <div class="task">
                    <h3 class="task-title">Task 1</h3>
                    <p class="task-desc">Description of task 1</p>
                </div>
                <div class="task">
                    <h3 class="task-title">Task 1</h3>
                    <p class="task-desc">Description of task 1</p>
                </div>
                <div class="task">
                    <h3 class="task-title">Task 1</h3>
                    <p class="task-desc">Description of task 1</p>
                </div>
                <div class="task">
                    <h3 class="task-title">Task 1</h3>
                    <p class="task-desc">Description of task 1</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/dash.js"></script>
</body>

</html>
