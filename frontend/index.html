<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crud joao sem I.a</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <main>
        <div class="container">
            <h1>Login</h1>
            <h2>Para entrar pro favor se registre</h2>
            <div class="logincase">
                <span style="color: red;" id="span1"> </span>
                <form action="">
                    <div class="inputbox1">
                        <i class="fa-solid fa-user"></i>
                        <input id="email" type="email" placeholder="Digite seu email">
                    </div>
                    <div class="inputbox2">
                        <i class="fa-solid fa-lock"></i>
                        <input id="pass" type="password" placeholder="Digite sua senha">
                    </div>
                    <div class="container2">
                        <button id="buttonstart">ENTRAR</button>
                        <div class="moreoption">
                            <a class="account" href="/register">Criar Conta</a>
                            <a class="account" href="">Forgout</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="/login.js"></script>
</body>

</html>
